<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Analisis hasil ketersediaan jadwal rapat.">
<title>Analisis Hasil — Verdant Schedule</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍃</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--bg:#f9f6f0;--surface:#fffef9;--border:#e0d8c8;--border-2:#cfc5b0;--green:#6b8f5e;--green-dark:#3b5a30;--green-pale:#eef3e8;--text:#4a4030;--muted:#8a7a5a;--accent:#c8a96e;--red:#b5544e;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;}

/* Toast */
.toast-wrap{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.08);display:flex;align-items:center;gap:8px;animation:tIn .3s ease;min-width:220px;}
.toast.ok{border-left:3px solid var(--green);}.toast.err{border-left:3px solid var(--red);}
.toast.hide{animation:tOut .3s ease forwards;}
@keyframes tIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0;transform:translateX(40px)}}

/* Error */
.error-page{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;text-align:center;padding:20px;}
.error-icon{font-size:48px;}.error-title{font-size:18px;font-weight:500;}
.error-msg{font-size:13px;color:var(--muted);max-width:300px;}
.error-link{font-size:13px;color:var(--green);text-decoration:none;font-weight:500;}.error-link:hover{text-decoration:underline;}

/* Layout */
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.topbar{border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;padding:0 20px;height:52px;gap:12px;}
.logo{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:var(--green-dark);}
.logo-mark{width:26px;height:26px;background:var(--green);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:14px;height:14px;}
.topbar-r{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:7px 16px;border-radius:8px;cursor:pointer;transition:all .15s;border:none;}
.btn-p{background:var(--green);color:#fff;}.btn-p:hover{background:var(--green-dark);}
.btn-o{background:transparent;color:var(--green-dark);border:1px solid var(--border-2);text-decoration:none;display:inline-flex;align-items:center;}.btn-o:hover{background:var(--green-pale);}
.main{padding:24px 28px;max-width:1100px;margin:0 auto;}
.page-title{font-size:20px;font-weight:500;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.card-h{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-t{font-size:13px;font-weight:500;}
.card-b{padding:16px;}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.metric-l{font-size:11px;color:var(--muted);margin-bottom:4px;}
.metric-v{font-size:22px;font-weight:300;color:var(--green-dark);font-family:'DM Mono',monospace;}
.section{display:grid;grid-template-columns:1fr 340px;gap:14px;margin-bottom:20px;}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;}
.badge-dot{width:5px;height:5px;border-radius:50%;}
.badge-g{background:var(--green-pale);color:var(--green-dark);}.badge-g .badge-dot{background:var(--green);}

/* Accordion Recs */
.rec-list{display:flex;flex-direction:column;gap:8px;}
.rec-item{border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:all .2s;}
.rec-item:hover{border-color:var(--green);}
.rec-item.open{border-color:var(--green);box-shadow:0 2px 12px rgba(107,143,94,.1);}
.rec-header{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background .15s;}
.rec-header:hover{background:var(--green-pale);}
.rec-item.open .rec-header{background:var(--green-pale);}
.rec-rank{width:24px;height:24px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rec-info{flex:1;min-width:0;}
.rec-day{font-size:10px;color:var(--muted);}
.rec-time{font-size:16px;font-weight:300;font-family:'DM Mono',monospace;color:var(--green-dark);}
.rec-meta-right{text-align:right;flex-shrink:0;}
.rec-count{font-size:12px;font-weight:500;color:var(--green);font-family:'DM Mono',monospace;}
.rec-dur{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.rec-arrow{color:var(--muted);font-size:12px;transition:transform .2s;flex-shrink:0;}
.rec-item.open .rec-arrow{transform:rotate(180deg);}
.rec-detail{padding:0 16px 14px;border-top:1px solid var(--border);animation:slideDown .2s ease;}
.rec-detail-inner{padding-top:12px;}
@keyframes slideDown{from{opacity:0;max-height:0;}to{opacity:1;max-height:300px;}}
.detail-section{margin-bottom:10px;}
.detail-label{font-size:11px;font-weight:500;margin-bottom:5px;}
.detail-label.ok{color:var(--green-dark);}.detail-label.no{color:var(--red);}
.name-tag{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px;margin:2px;}
.name-tag.ok{background:var(--green-pale);color:var(--green-dark);}
.name-tag.no{background:var(--bg);color:var(--muted);}

/* Compact Heatmap */
.heatmap{overflow-x:auto;}
.hm-grid{display:grid;min-width:400px;}
.hm-hcell{padding:5px 2px;text-align:center;font-size:9px;font-weight:500;color:var(--green-dark);letter-spacing:.03em;text-transform:uppercase;border-bottom:1px solid var(--border);}
.hm-tcell{padding:2px 4px;font-size:9px;font-family:'DM Mono',monospace;color:var(--muted);text-align:right;display:flex;align-items:center;justify-content:flex-end;border-bottom:1px solid rgba(224,216,200,.3);}
.hm-cell{height:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-bottom:1px solid rgba(224,216,200,.2);transition:all .1s;font-family:'DM Mono',monospace;font-size:9px;font-weight:500;position:relative;}
.hm-cell:hover{outline:2px solid var(--accent);z-index:10;}
.hm-cell.sel{outline:2px solid var(--accent);z-index:2;}
.hm-tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--green-dark);color:#fff;padding:6px 10px;border-radius:6px;font-size:10px;font-family:'DM Sans',sans-serif;white-space:nowrap;pointer-events:none;z-index:20;box-shadow:0 4px 12px rgba(0,0,0,.15);max-width:200px;white-space:normal;line-height:1.4;}
.hm-tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--green-dark);}
.hm-cell:not(:hover) .hm-tooltip{display:none;}

/* Mobile */
.m-tabs{display:flex;overflow-x:auto;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);scrollbar-width:none;}
.m-tabs::-webkit-scrollbar{display:none;}
.m-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .15s;font-family:'DM Sans',sans-serif;}
.m-tab.active{background:var(--green);color:#fff;border-color:var(--green);}
.m-slots{padding:0 16px 100px;}
.m-slot{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.m-slot-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);width:40px;flex-shrink:0;}
.m-bar-wrap{flex:1;height:22px;background:var(--bg);border-radius:6px;overflow:hidden;position:relative;cursor:pointer;}
.m-bar-fill{height:100%;background:var(--green);border-radius:6px;transition:width .4s;}
.m-bar-label{position:absolute;inset:0;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:500;}
.m-recs{padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
.m-section-title{font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px;}
@media(max-width:767px){.section{grid-template-columns:1fr;}.metrics{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyDHHweUfTvf66TY0fX5BaEWrIv_dhbDUlA",authDomain:"rapat-6f578.firebaseapp.com",projectId:"rapat-6f578",storageBucket:"rapat-6f578.firebasestorage.app",messagingSenderId:"650812218372",appId:"1:650812218372:web:c537c74c1d9a678fbda951"};
const db=getFirestore(initializeApp(firebaseConfig));
const eventId=new URLSearchParams(window.location.search).get('id');
const timeToMin=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
const minToTime=min=>`${String(Math.floor(min/60)).padStart(2,'0')}:${String(min%60).padStart(2,'0')}`;

function useToast(){const[toasts,setToasts]=React.useState([]);
const show=(msg,type='ok')=>{const id=Date.now();setToasts(p=>[...p,{id,msg,type,hide:false}]);setTimeout(()=>setToasts(p=>p.map(t=>t.id===id?{...t,hide:true}:t)),2500);setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),2800);};
return{toasts,show};}
function Toasts({toasts}){return(<div className="toast-wrap">{toasts.map(t=><div key={t.id} className={`toast ${t.type} ${t.hide?'hide':''}`}><span>{t.type==='ok'?'✓':'!'}</span><span>{t.msg}</span></div>)}</div>);}

const Topbar=({name,copy,toast})=>(
<div className="topbar">
<div className="logo"><div className="logo-mark"><svg viewBox="0 0 14 14" fill="none" stroke="#fff" strokeWidth="1.5" strokeLinecap="round"><path d="M7 2 C7 2 4 5 4 8 a3 3 0 0 0 6 0 C10 5 7 2 7 2z"/></svg></div>{name}</div>
<div className="topbar-r"><button className="btn btn-o" onClick={()=>{navigator.clipboard.writeText(window.location.href).then(()=>toast.show('Link analisis tersalin!','ok'));}}>Copy Link</button><button className="btn btn-p" onClick={copy}>Copy Summary</button></div>
</div>);

// Accordion Recommendation Item
const RecItem=({r,i,isOpen,onToggle,parts})=>{
const startSlot=r.startSlot;
return(
<div className={`rec-item ${isOpen?'open':''}`}>
<div className="rec-header" onClick={onToggle}>
<div className="rec-rank">{i+1}</div>
<div className="rec-info"><div className="rec-day">{r.day}</div><div className="rec-time">{r.start} — {r.displayEnd}</div></div>
<div className="rec-meta-right"><div className="rec-count">{r.count} orang</div><div className="rec-dur">{r.endMin-timeToMin(r.start)} min</div></div>
<div className="rec-arrow">▼</div>
</div>
{isOpen&&<div className="rec-detail"><div className="rec-detail-inner">
<div className="detail-section"><div className="detail-label ok"><i data-lucide="check-circle" style={{width:'12px',height:'12px',display:'inline',verticalAlign:'middle',marginRight:'4px'}}></i>Bisa ({startSlot.who.length})</div><div>{startSlot.who.map(n=><span key={n} className="name-tag ok">{n}</span>)}</div></div>
<div className="detail-section"><div className="detail-label no"><i data-lucide="x-circle" style={{width:'12px',height:'12px',display:'inline',verticalAlign:'middle',marginRight:'4px'}}></i>Tidak bisa ({startSlot.missing.length})</div><div>{startSlot.missing.length>0?startSlot.missing.map(n=><span key={n} className="name-tag no">{n}</span>):<span style={{fontSize:'11px',color:'var(--green)'}}>Semua bisa!</span>}</div></div>
</div></div>}
</div>);};

const DesktopLayout=({config,parts,slots,topRanges,openRec,setOpenRec,copy,toast})=>{
const cols=`36px repeat(${config.days.length},1fr)`;
const uniqueTimes=[...new Set(slots.map(s=>s.time))].sort();
return(<div><Topbar name={config.eventName} copy={copy} toast={toast}/>
<div className="main">
<div className="page-title">Analisis Hasil</div>
<div className="page-sub">{parts.length} partisipan telah mengisi</div>
<div className="metrics">
<div className="metric"><div className="metric-l">Total Partisipan</div><div className="metric-v">{parts.length}</div></div>
<div className="metric"><div className="metric-l">Slot Terisi</div><div className="metric-v">{slots.filter(s=>s.count>0).length}</div></div>
<div className="metric"><div className="metric-l">Hari Aktif</div><div className="metric-v">{config.days.length}</div></div>
</div>
<div className="section">
<div className="card"><div className="card-h"><span className="card-t">Heatmap Ketersediaan</span></div><div className="card-b" style={{padding:'10px'}}><div className="heatmap"><div className="hm-grid" style={{gridTemplateColumns:cols}}>
<div className="hm-hcell" style={{background:'var(--surface)'}}></div>
{config.days.map(d=><div key={d} className="hm-hcell">{d.split(',')[0]}</div>)}
{uniqueTimes.map(t=><React.Fragment key={t}>
<div className="hm-tcell">{t}</div>
{config.days.map(d=>{const s=slots.find(x=>x.id===`${d}|${t}`);const intensity=s?s.count/(parts.length||1):0;const bg=s&&s.count>0?`rgba(107,143,94,${Math.max(intensity,.15)})`:'transparent';
return(<div key={`${d}|${t}`} className="hm-cell" style={{backgroundColor:bg,color:intensity>.5?'#fff':'var(--text)'}}>
{s&&s.count>0&&<><span>{s.count}</span><div className="hm-tooltip">{s.who.join(', ')}</div></>}</div>);})}
</React.Fragment>)}
</div></div></div></div>
<div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
<div className="card"><div className="card-h"><span className="card-t">Top Rekomendasi</span></div><div className="card-b"><div className="rec-list">
{topRanges.map((r,i)=><RecItem key={i} r={r} i={i} isOpen={openRec===i} onToggle={()=>setOpenRec(openRec===i?null:i)} parts={parts}/>)}
{topRanges.length===0&&<div style={{color:'var(--muted)',fontSize:'13px',textAlign:'center',padding:'12px'}}>Belum cukup data.</div>}
</div></div></div>
<div className="card"><div className="card-h"><span className="card-t">Partisipan ({parts.length})</span></div><div className="card-b" style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
{parts.map((p,i)=><span key={p.name||i} className="badge badge-g"><span className="badge-dot"></span>{p.name}</span>)}
</div></div>
</div>
</div></div></div>);};

const MobileLayout=({config,parts,slots,topRanges,openRec,setOpenRec,copy,toast})=>{
const[activeDay,setActiveDay]=React.useState(config.days[0]);
const daySlots=React.useMemo(()=>slots.filter(s=>s.day===activeDay).sort((a,b)=>timeToMin(a.time)-timeToMin(b.time)),[slots,activeDay]);
return(<div>
<div className="topbar"><div className="logo"><div className="logo-mark"><svg viewBox="0 0 14 14" fill="none" stroke="#fff" strokeWidth="1.5" strokeLinecap="round"><path d="M7 2 C7 2 4 5 4 8 a3 3 0 0 0 6 0 C10 5 7 2 7 2z"/></svg></div>
<div><div style={{fontSize:'13px',fontWeight:500,maxWidth:'140px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{config.eventName}</div><div style={{fontSize:'10px',color:'var(--muted)',fontFamily:"'DM Mono',monospace"}}>{parts.length} partisipan</div></div>
</div><div className="topbar-r"><button className="btn btn-o" onClick={()=>{navigator.clipboard.writeText(window.location.href).then(()=>toast.show('Link tersalin!','ok'));}} style={{fontSize:'11px',padding:'5px 10px'}}>Link</button><button className="btn btn-p" onClick={copy} style={{fontSize:'11px',padding:'5px 10px'}}>Copy</button></div></div>
<div className="m-recs">
<div className="m-section-title">Rekomendasi Terbaik</div>
{topRanges.map((r,i)=><RecItem key={i} r={r} i={i} isOpen={openRec===i} onToggle={()=>setOpenRec(openRec===i?null:i)} parts={parts}/>)}
{topRanges.length===0&&<div style={{color:'var(--muted)',fontSize:'12px'}}>Belum cukup data.</div>}
</div>
<div style={{padding:'0 16px'}}><div className="m-section-title">Detail per Hari</div></div>
<div className="m-tabs">{config.days.map(d=>(<button key={d} onClick={()=>setActiveDay(d)} className={`m-tab ${activeDay===d?'active':''}`}>{d.split(',')[0]}</button>))}</div>
<div className="m-slots">{daySlots.map(s=>{const pct=parts.length>0?(s.count/parts.length)*100:0;
return(<div key={s.id} className="m-slot">
<div className="m-slot-time">{s.time}</div>
<div className="m-bar-wrap"><div className="m-bar-fill" style={{width:`${pct}%`}}></div><div className="m-bar-label" style={{color:pct>50?'#fff':'var(--text)'}}>{s.count}/{parts.length}</div></div>
</div>);})}</div>
</div>);};

function Analysis(){
const[config,setConfig]=React.useState(null);const[parts,setParts]=React.useState([]);
const[openRec,setOpenRec]=React.useState(null);
const[isMobile,setIsMobile]=React.useState(window.innerWidth<768);
const[error,setError]=React.useState(null);
const toast=useToast();
React.useEffect(()=>{if(window.lucide)lucide.createIcons();});
React.useEffect(()=>{const h=()=>setIsMobile(window.innerWidth<768);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);
React.useEffect(()=>{if(!eventId){setError('noId');return;}
onSnapshot(doc(db,'events',eventId),d=>{if(d.exists()){setConfig(d.data());}else{setError('notFound');}});
onSnapshot(collection(db,'events',eventId,'participants'),s=>setParts(s.docs.map(d=>d.data())));},[]);

const slots=React.useMemo(()=>{if(!config)return[];const res=[];const times=[];
for(let h=config.startHour;h<config.endHour;h++){times.push(`${h}:00`.padStart(5,'0'));times.push(`${h}:30`.padStart(5,'0'));}
config.days.forEach(d=>{times.forEach(t=>{const id=`${d}|${t}`;const who=parts.filter(p=>p.slots?.includes(id)).map(p=>p.name);const missing=parts.filter(p=>!p.slots?.includes(id)).map(p=>p.name);
res.push({id,day:d,time:t,count:who.length,who,missing});});});return res;},[config,parts]);

const topRanges=React.useMemo(()=>{if(slots.length===0)return[];const byDay={};slots.forEach(s=>{if(!byDay[s.day])byDay[s.day]=[];byDay[s.day].push(s);});
let ranges=[];Object.keys(byDay).forEach(day=>{const ds=byDay[day].sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));if(!ds.length)return;
let cur={day,start:ds[0].time,endMin:timeToMin(ds[0].time)+30,count:ds[0].count,startSlot:ds[0]};
for(let i=1;i<ds.length;i++){const s=ds[i];const sS=timeToMin(s.time);if(sS===cur.endMin&&s.count===cur.count){cur.endMin+=30;}else{ranges.push({...cur,displayEnd:minToTime(cur.endMin)});cur={day,start:s.time,endMin:sS+30,count:s.count,startSlot:s};}}
ranges.push({...cur,displayEnd:minToTime(cur.endMin)});});
ranges.sort((a,b)=>{if(b.count!==a.count)return b.count-a.count;return(b.endMin-timeToMin(b.start))-(a.endMin-timeToMin(a.start));});return ranges.slice(0,3);},[slots]);

const copy=()=>{if(!topRanges.length){toast.show('Belum ada data untuk di-copy.','err');return;}
const txt=`*HASIL: ${config.eventName}*\nTotal: ${parts.length} Orang\n\nRekomendasi:\n${topRanges.map((r,i)=>`${i+1}. ${r.day}, ${r.start}-${r.displayEnd} (${r.count} orang)`).join('\n')}\n\nLink: ${window.location.href}`;
navigator.clipboard.writeText(txt).then(()=>toast.show('Summary tersalin!','ok')).catch(()=>toast.show('Gagal menyalin.','err'));};

if(error==='noId')return<div className="error-page"><div className="error-icon"><i data-lucide="link-2-off" style={{width:'48px',height:'48px',color:'var(--muted)'}}></i></div><div className="error-title">Link Tidak Valid</div><div className="error-msg">Halaman ini memerlukan parameter event ID.</div><a href="admin.html" className="error-link">Buka Admin Panel →</a></div>;
if(error==='notFound')return<div className="error-page"><div className="error-icon"><i data-lucide="search-x" style={{width:'48px',height:'48px',color:'var(--muted)'}}></i></div><div className="error-title">Event Tidak Ditemukan</div><div className="error-msg">Event ini mungkin sudah dihapus.</div><a href="admin.html" className="error-link">Buka Admin Panel →</a></div>;
if(!config)return<div className="loading"><div className="spinner"></div><div style={{fontSize:'13px',color:'var(--muted)',fontFamily:"'DM Mono',monospace"}}>Memuat analisis...</div></div>;

const props={config,parts,slots,topRanges,openRec,setOpenRec,copy,toast};
return<><Toasts toasts={toast.toasts}/>{isMobile?<MobileLayout {...props}/>:<DesktopLayout {...props}/>}</>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Analysis/>);
</script>
</body>
</html>
