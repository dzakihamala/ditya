<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Isi ketersediaan jadwal rapat Anda dengan mudah dan cepat.">
    <title>Input Jadwal — Verdant Schedule</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍃</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        --bg:#f9f6f0;--surface:#fffef9;--border:#e0d8c8;--border-2:#cfc5b0;
        --green:#6b8f5e;--green-dark:#3b5a30;--green-pale:#eef3e8;
        --text:#4a4030;--muted:#8a7a5a;--accent:#c8a96e;
        --red:#b5544e;--red-pale:#faf0ee;
      }
      *{box-sizing:border-box;margin:0;padding:0;}
      body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;overscroll-behavior:none;}
      #root{min-height:100vh;display:flex;flex-direction:column;}

      /* Toast */
      .toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
      .toast{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,0.08);display:flex;align-items:center;gap:8px;animation:toastIn .3s ease;min-width:240px;}
      .toast.success{border-left:3px solid var(--green);}
      .toast.error{border-left:3px solid var(--red);}
      .toast.hiding{animation:toastOut .3s ease forwards;}
      @keyframes toastIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
      @keyframes toastOut{from{opacity:1;transform:translateX(0);}to{opacity:0;transform:translateX(40px);}}

      /* Loading */
      .loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;}
      .loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;}
      .loading-text{font-size:13px;color:var(--muted);font-family:'DM Mono',monospace;}
      @keyframes spin{to{transform:rotate(360deg);}}

      /* Login */
      .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
      .login-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:40px 32px;width:100%;max-width:380px;text-align:center;}
      .login-badge{display:inline-block;font-size:10px;font-weight:500;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;font-family:'DM Mono',monospace;}
      .login-title{font-size:22px;font-weight:500;color:var(--text);margin-bottom:24px;}
      .input{font-family:'DM Sans',sans-serif;font-size:14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);outline:none;transition:border-color .15s;width:100%;}
      .input:focus{border-color:var(--green);}
      .input::placeholder{color:var(--muted);}
      .login-hint{font-size:11px;color:var(--muted);margin-top:8px;margin-bottom:16px;}
      .error-page{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;text-align:center;padding:20px;}
      .error-icon{font-size:48px;}.error-title{font-size:18px;font-weight:500;}.error-msg{font-size:13px;color:var(--muted);max-width:300px;}
      .error-link{font-size:13px;color:var(--green);text-decoration:none;font-weight:500;}.error-link:hover{text-decoration:underline;}

      /* Buttons */
      .btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:10px 20px;border-radius:8px;cursor:pointer;transition:all .15s;border:none;width:100%;}
      .btn-primary{background:var(--green);color:#fff;}
      .btn-primary:hover{background:var(--green-dark);}
      .btn-primary:disabled{opacity:.5;cursor:not-allowed;}
      .btn-outline{background:transparent;color:var(--green-dark);border:1px solid var(--border-2);}
      .btn-outline:hover{background:var(--green-pale);}

      /* Topbar */
      .topbar{border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;padding:0 20px;height:52px;gap:12px;flex-shrink:0;}
      .logo{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:var(--green-dark);}
      .logo-mark{width:26px;height:26px;background:var(--green);border-radius:7px;display:flex;align-items:center;justify-content:center;}
      .logo-mark svg{width:14px;height:14px;}
      .topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
      .topbar-user{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
      .topbar-link{font-size:12px;color:var(--green);font-weight:500;text-decoration:none;padding:5px 12px;border:1px solid var(--border);border-radius:8px;transition:all .15s;}
      .topbar-link:hover{background:var(--green-pale);}

      /* Day tabs (mobile) */
      .day-tabs{display:flex;overflow-x:auto;gap:6px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface);-ms-overflow-style:none;scrollbar-width:none;}
      .day-tabs::-webkit-scrollbar{display:none;}
      .day-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .15s;font-family:'DM Sans',sans-serif;}
      .day-tab.active{background:var(--green);color:#fff;border-color:var(--green);}

      /* Desktop Grid */
      .grid-wrap{flex:1;overflow:auto;padding:20px;background:var(--bg);}
      .grid-table{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:inline-block;min-width:100%;}
      .grid-header,.grid-row{display:grid;}
      .grid-header{background:var(--green-pale);position:sticky;top:0;z-index:5;}
      .grid-header-cell{padding:10px 8px;text-align:center;font-size:11px;font-weight:500;color:var(--green-dark);letter-spacing:.04em;text-transform:uppercase;border-right:1px solid var(--border);}
      .grid-time-cell{padding:6px 8px;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);text-align:right;border-right:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:flex-end;font-weight:500;}
      .grid-slot{height:38px;border-right:1px solid var(--border);border-bottom:1px solid rgba(224,216,200,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s;position:relative;}
      .grid-slot:hover{background:var(--green-pale);}
      .grid-slot.selected{background:var(--green);}
      .grid-slot.selected:hover{background:var(--green-dark);}
      .grid-slot .check{color:#fff;font-size:12px;}
      .grid-slot .others-bar{position:absolute;inset:0;background:var(--green);pointer-events:none;border-radius:2px;}
      .grid-row{border-bottom:1px solid rgba(224,216,200,.4);}

      /* Mobile slots */
      .slot-list{flex:1;overflow-y:auto;background:var(--bg);padding-bottom:100px;}
      .slot-item{display:flex;border-bottom:1px solid var(--border);min-height:48px;transition:background .1s;}
      .slot-time{width:56px;background:var(--surface);border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);font-weight:500;flex-shrink:0;}
      .slot-body{flex:1;display:flex;align-items:center;padding:0 16px;cursor:pointer;transition:all .15s;}
      .slot-body.active{background:var(--green);}
      .slot-body .slot-label{font-size:12px;font-weight:500;}
      .slot-body.active .slot-label{color:#fff;}
      .slot-body .slot-label{color:var(--muted);}
      .slot-body .slot-info{margin-left:auto;font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:12px;}
      .slot-body.active .slot-info{background:rgba(255,255,255,.2);color:#fff;}
      .slot-body:not(.active) .slot-info{background:var(--green-pale);color:var(--green);}

      /* Save FAB */
      .save-fab{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:50;animation:fabIn .3s ease;}
      .save-fab .btn{padding:12px 28px;border-radius:24px;box-shadow:0 4px 20px rgba(107,143,94,.3);display:flex;align-items:center;gap:8px;width:auto;font-size:14px;}
      @keyframes fabIn{from{opacity:0;transform:translateX(-50%) translateY(20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

      @media(max-width:767px){
        .topbar{padding:0 14px;height:48px;}
        .logo{font-size:13px;}
      }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, onSnapshot, setDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHHweUfTvf66TY0fX5BaEWrIv_dhbDUlA",
            authDomain: "rapat-6f578.firebaseapp.com",
            projectId: "rapat-6f578",
            storageBucket: "rapat-6f578.firebasestorage.app",
            messagingSenderId: "650812218372",
            appId: "1:650812218372:web:c537c74c1d9a678fbda951"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const eventId = new URLSearchParams(window.location.search).get('id');

        // --- Toast System ---
        function ToastContainer({ toasts, onRemove }) {
            return (
                <div className="toast-container">
                    {toasts.map(t => (
                        <div key={t.id} className={`toast ${t.type} ${t.hiding ? 'hiding' : ''}`}>
                            <span>{t.type === 'success' ? '✓' : '!'}</span>
                            <span>{t.message}</span>
                        </div>
                    ))}
                </div>
            );
        }

        function useToast() {
            const [toasts, setToasts] = React.useState([]);
            const show = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type, hiding: false }]);
                setTimeout(() => setToasts(prev => prev.map(t => t.id === id ? {...t, hiding: true} : t)), 2500);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 2800);
            };
            return { toasts, show };
        }

        // --- Save Button ---
        function SaveButton({ hasChanges, onSave, isSaving }) {
            if (!hasChanges) return null;
            return (
                <div className="save-fab">
                    <button className="btn btn-primary" onClick={onSave} disabled={isSaving}>
                        {isSaving ? "Menyimpan..." : "Simpan Perubahan"}
                        {!isSaving && <span>💾</span>}
                    </button>
                </div>
            );
        }

        // --- Desktop View ---
        function DesktopView({ config, mySlots, allParts, name, onUpdateSlots, onSave, hasChanges, isSaving }) {
            const [drag, setDrag] = React.useState(false);
            const [mode, setMode] = React.useState(true);

            const times = [];
            for(let h=config.startHour; h<config.endHour; h++) {
                times.push(`${h}:00`.padStart(5,'0'));
                times.push(`${h}:30`.padStart(5,'0'));
            }

            const handleSlot = (id, type) => {
                if(type === 'down') { setDrag(true); const willAdd = !mySlots.has(id); setMode(willAdd); onUpdateSlots(id, willAdd); }
                else if (type === 'enter' && drag) { onUpdateSlots(id, mode); }
            };
            const finishDrag = () => { if(drag) setDrag(false); };
            const cols = `50px repeat(${config.days.length}, minmax(80px, 1fr))`;

            return (
                <div style={{display:'flex',flexDirection:'column',height:'100%',userSelect:'none'}} onMouseUp={finishDrag} onMouseLeave={finishDrag}>
                    <div className="topbar">
                        <div className="logo">
                            <div className="logo-mark"><svg viewBox="0 0 14 14" fill="none" stroke="#fff" strokeWidth="1.5" strokeLinecap="round"><path d="M7 2 C7 2 4 5 4 8 a3 3 0 0 0 6 0 C10 5 7 2 7 2z"/></svg></div>
                            {config.eventName}
                        </div>
                        <div className="topbar-right">
                            <span className="topbar-user">{name}</span>
                            <a href={`analysis.html?id=${eventId}`} className="topbar-link">Lihat Hasil →</a>
                        </div>
                    </div>
                    <div className="grid-wrap">
                        <div className="grid-table" style={{marginBottom:'80px'}}>
                            <div className="grid-header" style={{display:'grid',gridTemplateColumns:cols}}>
                                <div className="grid-header-cell" style={{background:'var(--surface)'}}></div>
                                {config.days.map(d => <div key={d} className="grid-header-cell">{d.split(',')[0]}</div>)}
                            </div>
                            {times.map(t => (
                                <div key={t} className="grid-row" style={{display:'grid',gridTemplateColumns:cols}}>
                                    <div className="grid-time-cell">{t}</div>
                                    {config.days.map(d => {
                                        const id = `${d}|${t}`;
                                        const isMy = mySlots.has(id);
                                        const othersCount = allParts.filter(p => p.slots?.includes(id)).length;
                                        const opacity = Math.min(othersCount * 0.15, 0.4);
                                        return (
                                            <div key={id}
                                                onMouseDown={()=>handleSlot(id,'down')}
                                                onMouseEnter={()=>handleSlot(id,'enter')}
                                                className={`grid-slot ${isMy ? 'selected' : ''}`}>
                                                {!isMy && othersCount > 0 && <div className="others-bar" style={{opacity}}></div>}
                                                {isMy && <span className="check">✓</span>}
                                            </div>
                                        );
                                    })}
                                </div>
                            ))}
                        </div>
                    </div>
                    <SaveButton hasChanges={hasChanges} onSave={onSave} isSaving={isSaving} />
                </div>
            );
        }

        // --- Mobile View ---
        function MobileView({ config, mySlots, allParts, name, onUpdateSlots, onSave, hasChanges, isSaving }) {
            const [activeDayIndex, setActiveDayIndex] = React.useState(0);
            const currentDayName = config.days[activeDayIndex];
            const times = [];
            for(let h=config.startHour; h<config.endHour; h++) { times.push(`${h}:00`.padStart(5,'0')); times.push(`${h}:30`.padStart(5,'0')); }
            const toggleSlot = (id) => { onUpdateSlots(id, !mySlots.has(id)); };

            return (
                <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
                    <div className="topbar">
                        <div className="logo">
                            <div className="logo-mark"><svg viewBox="0 0 14 14" fill="none" stroke="#fff" strokeWidth="1.5" strokeLinecap="round"><path d="M7 2 C7 2 4 5 4 8 a3 3 0 0 0 6 0 C10 5 7 2 7 2z"/></svg></div>
                            <div style={{overflow:'hidden'}}>
                                <div style={{fontSize:'13px',fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:'160px'}}>{config.eventName}</div>
                                <div style={{fontSize:'10px',color:'var(--muted)',fontFamily:"'DM Mono',monospace"}}>{name}</div>
                            </div>
                        </div>
                        <div className="topbar-right">
                            <a href={`analysis.html?id=${eventId}`} className="topbar-link">Hasil →</a>
                        </div>
                    </div>
                    <div className="day-tabs">
                        {config.days.map((d, idx) => (
                            <button key={d} onClick={() => setActiveDayIndex(idx)} className={`day-tab ${activeDayIndex === idx ? 'active' : ''}`}>
                                {d.split(',')[0]}
                            </button>
                        ))}
                    </div>
                    <div className="slot-list">
                        {times.map(t => {
                            const id = `${currentDayName}|${t}`;
                            const isMy = mySlots.has(id);
                            const othersCount = allParts.filter(p => p.slots?.includes(id)).length;
                            return (
                                <div key={t} className="slot-item">
                                    <div className="slot-time">{t}</div>
                                    <div onClick={() => toggleSlot(id)} className={`slot-body ${isMy ? 'active' : ''}`}>
                                        <span className="slot-label">{isMy ? 'Tersedia' : 'Kosong'}</span>
                                        {othersCount > 0 && <span className="slot-info">+{othersCount} lain</span>}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                    <SaveButton hasChanges={hasChanges} onSave={onSave} isSaving={isSaving} />
                </div>
            );
        }

        // --- Main App ---
        function App() {
            const [user, setUser] = React.useState(null);
            const [name, setName] = React.useState('');
            const [joined, setJoined] = React.useState(false);
            const [config, setConfig] = React.useState(null);
            const [participantId, setParticipantId] = React.useState(null);
            const [mySlots, setMySlots] = React.useState(new Set());
            const [hasChanges, setHasChanges] = React.useState(false);
            const [isSaving, setIsSaving] = React.useState(false);
            const [allParts, setAllParts] = React.useState([]);
            const [isMobile, setIsMobile] = React.useState(window.innerWidth < 768);
            const [error, setError] = React.useState(!eventId ? 'noId' : null);
            const toast = useToast();

            // Initialize Lucide icons after each render
            React.useEffect(() => { if(window.lucide) lucide.createIcons(); });

            React.useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // Warn on unsaved changes
            React.useEffect(() => {
                const handler = (e) => { if(hasChanges) { e.preventDefault(); e.returnValue = ''; } };
                window.addEventListener('beforeunload', handler);
                return () => window.removeEventListener('beforeunload', handler);
            }, [hasChanges]);

            React.useEffect(() => {
                if(!eventId) return;
                signInAnonymously(auth);
                onAuthStateChanged(auth, u => setUser(u));
                const unsub1 = onSnapshot(doc(db, 'events', eventId), d => {
                    if(d.exists()) { setConfig(d.data()); } else { setError('notFound'); }
                });
                const unsub2 = onSnapshot(collection(db, 'events', eventId, 'participants'), s => {
                    setAllParts(s.docs.map(d => ({uid: d.id, ...d.data()})));
                });
                return () => { unsub1(); unsub2(); }
            }, []);

            const handleUpdateSlots = (id, shouldAdd) => {
                const newSlots = new Set(mySlots);
                if(shouldAdd) newSlots.add(id); else newSlots.delete(id);
                setMySlots(newSlots);
                setHasChanges(true);
            };

            const handleJoin = async (e) => {
                e.preventDefault();
                if(!name.trim()) return;
                const cleanName = name.trim().toUpperCase();
                const partsRef = collection(db, 'events', eventId, 'participants');
                const q = query(partsRef, where('name', '==', cleanName));
                try {
                    const querySnapshot = await getDocs(q);
                    if (!querySnapshot.empty) {
                        const existingDoc = querySnapshot.docs[0];
                        const existingData = existingDoc.data();
                        setParticipantId(existingDoc.id);
                        const loadedSlots = new Set(existingData.slots || []);
                        setMySlots(loadedSlots);
                        toast.show(`Selamat datang kembali, ${cleanName}!`, 'success');
                    } else {
                        setParticipantId(user.uid);
                        setMySlots(new Set());
                    }
                    setName(cleanName);
                    setJoined(true);
                } catch (error) {
                    console.error("Error joining:", error);
                    toast.show("Gagal memuat data. Coba refresh.", "error");
                }
            };

            const saveToFirebase = async () => {
                if(!participantId) return;
                setIsSaving(true);
                try {
                    await setDoc(doc(db, 'events', eventId, 'participants', participantId), {
                        name: name, slots: Array.from(mySlots), updatedAt: serverTimestamp()
                    }, { merge: true });
                    setHasChanges(false);
                    toast.show("Jadwal berhasil disimpan!", "success");
                } catch (error) {
                    toast.show("Gagal menyimpan: " + error.message, "error");
                } finally { setIsSaving(false); }
            };

            // Error states
            if(error === 'noId') return (
                <div className="error-page">
                    <div className="error-icon"><i data-lucide="link-2-off" style={{width:'48px',height:'48px',color:'var(--muted)'}}></i></div>
                    <div className="error-title">Link Tidak Valid</div>
                    <div className="error-msg">Halaman ini memerlukan parameter event ID. Pastikan Anda membuka link undangan yang benar.</div>
                    <a href="admin.html" className="error-link">Buka Admin Panel →</a>
                </div>
            );
            if(error === 'notFound') return (
                <div className="error-page">
                    <div className="error-icon"><i data-lucide="search-x" style={{width:'48px',height:'48px',color:'var(--muted)'}}></i></div>
                    <div className="error-title">Event Tidak Ditemukan</div>
                    <div className="error-msg">Event ini mungkin sudah dihapus atau ID-nya salah.</div>
                    <a href="admin.html" className="error-link">Buka Admin Panel →</a>
                </div>
            );

            // Loading
            if(!config) return (
                <div className="loading-screen">
                    <div className="loading-spinner"></div>
                    <div className="loading-text">Memuat jadwal...</div>
                    <ToastContainer toasts={toast.toasts} />
                </div>
            );

            // Login
            if(!joined) return (
                <div className="login-wrap">
                    <div className="login-card">
                        <div className="login-badge">Undangan ke</div>
                        <div className="login-title">{config.eventName}</div>
                        <form onSubmit={handleJoin} style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                            <input className="input" placeholder="Masukkan nama Anda" value={name} onChange={e=>setName(e.target.value)} maxLength={20} required style={{textAlign:'center'}} />
                            <div className="login-hint">*Jika nama sudah ada, jadwal lama akan dimuat.</div>
                            <button className="btn btn-primary" type="submit">Masuk</button>
                        </form>
                    </div>
                    <ToastContainer toasts={toast.toasts} />
                </div>
            );

            const otherParticipants = allParts.filter(p => p.uid !== participantId);
            const viewProps = { config, mySlots, allParts: otherParticipants, name, onUpdateSlots: handleUpdateSlots, onSave: saveToFirebase, hasChanges, isSaving };

            return (
                <>
                    {isMobile ? <MobileView {...viewProps} /> : <DesktopView {...viewProps} />}
                    <ToastContainer toasts={toast.toasts} />
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
