<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Super Admin — Kelola kredensial admin Verdant Schedule.">
<title>Super Admin — Verdant Schedule</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍃</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #f9f6f0; --surface: #fffef9; --border: #e0d8c8; --border-2: #cfc5b0;
    --green: #6b8f5e; --green-dark: #3b5a30; --green-pale: #eef3e8;
    --text: #4a4030; --muted: #8a7a5a; --accent: #c8a96e;
    --red: #b5544e; --red-pale: #faf0ee;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 15px; line-height: 1.6; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 36px 32px; width: 100%; max-width: 440px;
  }
  .card-badge {
    display: inline-block; font-size: 10px; font-weight: 500; color: var(--red);
    letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px;
    font-family: 'DM Mono', monospace; background: var(--red-pale);
    padding: 4px 10px; border-radius: 20px;
  }
  .card-title {
    font-size: 20px; font-weight: 500; color: var(--text);
    margin-bottom: 24px; text-align: center;
  }

  .input {
    font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px;
    color: var(--text); outline: none; transition: border-color .15s; width: 100%;
  }
  .input:focus { border-color: var(--green); }
  .input::placeholder { color: var(--muted); }

  .btn {
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    padding: 10px 18px; border-radius: 8px; cursor: pointer;
    transition: all .15s; border: none; width: 100%;
  }
  .btn-p { background: var(--green); color: #fff; }
  .btn-p:hover { background: var(--green-dark); }
  .btn-r {
    background: transparent; color: var(--red); border: 1px solid var(--red);
    font-size: 11px; padding: 6px 12px; width: auto; border-radius: 6px;
  }
  .btn-r:hover { background: var(--red-pale); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  .admin-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .admin-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); transition: background .1s;
  }
  .admin-item:hover { background: var(--green-pale); }
  .admin-name { font-size: 14px; font-weight: 500; }
  .admin-pass { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .admin-empty {
    text-align: center; padding: 16px; font-size: 12px;
    color: var(--muted); font-family: 'DM Mono', monospace;
  }

  .form-label {
    font-size: 12px; font-weight: 500; color: var(--muted);
    letter-spacing: .06em; text-transform: uppercase; margin-bottom: 10px; display: block;
  }
  .form-row { display: flex; gap: 8px; margin-bottom: 12px; }

  /* Toast */
  .toast-wrap {
    position: fixed; top: 20px; right: 20px; z-index: 9999;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 20px; font-size: 13px; color: var(--text);
    box-shadow: 0 4px 20px rgba(0,0,0,.08); display: flex; align-items: center;
    gap: 8px; animation: tIn .3s ease; min-width: 200px;
  }
  .toast.ok { border-left: 3px solid var(--green); }
  .toast.err { border-left: 3px solid var(--red); }
  .toast.hide { animation: tOut .3s ease forwards; }
  @keyframes tIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes tOut { from { opacity: 1; } to { opacity: 0; transform: translateX(40px); } }

  /* Confirm Dialog */
  .confirm-overlay {
    position: fixed; inset: 0; background: rgba(74,64,48,.3);
    display: flex; align-items: center; justify-content: center;
    z-index: 9998; animation: fadeIn .15s ease;
  }
  .confirm-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; max-width: 340px; width: 90%; text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,.12);
  }
  .confirm-msg { font-size: 14px; margin-bottom: 20px; color: var(--text); line-height: 1.5; }
  .confirm-actions { display: flex; gap: 8px; }
  .confirm-actions .btn { flex: 1; }
  .btn-ghost {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    padding: 10px 18px; border-radius: 8px; cursor: pointer; transition: all .15s;
  }
  .btn-ghost:hover { background: var(--green-pale); color: var(--text); }
  .btn-danger {
    background: var(--red); color: #fff; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    padding: 10px 18px; border-radius: 8px; cursor: pointer; transition: all .15s;
  }
  .btn-danger:hover { background: #9a3a35; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDHHweUfTvf66TY0fX5BaEWrIv_dhbDUlA",
    authDomain: "rapat-6f578.firebaseapp.com",
    projectId: "rapat-6f578",
    storageBucket: "rapat-6f578.firebasestorage.app",
    messagingSenderId: "650812218372",
    appId: "1:650812218372:web:c537c74c1d9a678fbda951"
};
const db = getFirestore(initializeApp(firebaseConfig));

// SHA-256 hash for password storage
async function hashPassword(pwd) {
    const encoder = new TextEncoder();
    const data = encoder.encode(pwd);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// Master key — hashed (SHA-256 of "root123")
const MASTER_KEY_HASH = "e14cb9e5c0eeee0ea313a4e04fbd10aa17ac17aa33a3cad4bdfe74b87ca18ef8";

// --- Shared Hooks ---
function useToast() {
    const [toasts, setToasts] = React.useState([]);
    const show = (msg, type = 'ok') => {
        const id = Date.now();
        setToasts(p => [...p, { id, msg, type, hide: false }]);
        setTimeout(() => setToasts(p => p.map(t => t.id === id ? { ...t, hide: true } : t)), 2500);
        setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 2800);
    };
    return { toasts, show };
}

function Toasts({ toasts }) {
    return (
        <div className="toast-wrap">
            {toasts.map(t => (
                <div key={t.id} className={`toast ${t.type} ${t.hide ? 'hide' : ''}`}>
                    <span>{t.type === 'ok' ? '✓' : '!'}</span>
                    <span>{t.msg}</span>
                </div>
            ))}
        </div>
    );
}

// --- Confirm Dialog Component ---
function ConfirmDialog({ message, onConfirm, onCancel }) {
    return (
        <div className="confirm-overlay" onClick={onCancel}>
            <div className="confirm-box" onClick={e => e.stopPropagation()}>
                <div className="confirm-msg">{message}</div>
                <div className="confirm-actions">
                    <button className="btn-ghost" onClick={onCancel}>Batal</button>
                    <button className="btn-danger" onClick={onConfirm}>Hapus</button>
                </div>
            </div>
        </div>
    );
}

// --- Main Component ---
function SuperAdmin() {
    const [key, setKey] = React.useState('');
    const [auth, setAuth] = React.useState(false);
    const [admins, setAdmins] = React.useState([]);
    const [u, setU] = React.useState('');
    const [p, setP] = React.useState('');
    const [confirmTarget, setConfirmTarget] = React.useState(null);
    const toast = useToast();

    // Initialize Lucide icons after each render
    React.useEffect(() => { if(window.lucide) lucide.createIcons(); });

    const unlock = async (e) => {
        e.preventDefault();
        const hashed = await hashPassword(key);
        if (hashed === MASTER_KEY_HASH) {
            setAuth(true);
            loadAdmins();
            toast.show('Akses diberikan.', 'ok');
        } else {
            toast.show('Master key salah!', 'err');
        }
    };

    const loadAdmins = async () => {
        try {
            const snap = await getDoc(doc(db, 'system_config', 'admin_creds'));
            if (snap.exists()) setAdmins(snap.data().users || []);
        } catch (e) {
            toast.show('Gagal koneksi: ' + e.message, 'err');
        }
    };

    const addAdmin = async (e) => {
        e.preventDefault();
        if (!u || !p) return;

        // Check duplicate username
        if (admins.some(a => a.u.toLowerCase() === u.toLowerCase())) {
            toast.show('Username sudah ada!', 'err');
            return;
        }

        const hashedP = await hashPassword(p);
        const newAdmins = [...admins, { u: u.trim(), p: hashedP }];
        await setDoc(doc(db, 'system_config', 'admin_creds'), { users: newAdmins });
        setAdmins(newAdmins);
        setU('');
        setP('');
        toast.show('Admin berhasil ditambahkan!', 'ok');
    };

    const delAdmin = async (targetU) => {
        const newAdmins = admins.filter(a => a.u !== targetU);
        await setDoc(doc(db, 'system_config', 'admin_creds'), { users: newAdmins });
        setAdmins(newAdmins);
        setConfirmTarget(null);
        toast.show('Admin dihapus.', 'ok');
    };

    // --- Login Screen ---
    if (!auth) return (
        <>
            <Toasts toasts={toast.toasts} />
            <div className="card" style={{ textAlign: 'center' }}>
                <div className="card-badge">Restricted Area</div>
                <div className="card-title">Super Admin</div>
                <form onSubmit={unlock} style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                    <input
                        type="password" className="input" placeholder="Master Key"
                        value={key} onChange={e => setKey(e.target.value)}
                        style={{ textAlign: 'center' }} autoFocus
                    />
                    <button className="btn btn-p">Unlock</button>
                </form>
            </div>
        </>
    );

    // --- Admin Management ---
    return (
        <>
            <Toasts toasts={toast.toasts} />
            {confirmTarget && (
                <ConfirmDialog
                    message={`Hapus admin "${confirmTarget}" dari sistem?`}
                    onConfirm={() => delAdmin(confirmTarget)}
                    onCancel={() => setConfirmTarget(null)}
                />
            )}
            <div className="card">
                <div className="card-title">Kelola Admin</div>
                <div className="admin-list">
                    {admins.length === 0 ? (
                        <div className="admin-empty">Belum ada admin. Buat di bawah.</div>
                    ) : (
                        admins.map((a, i) => (
                            <div key={i} className="admin-item">
                                <div>
                                    <div className="admin-name">{a.u}</div>
                                    <div className="admin-pass">{a.p.length > 20 ? '••••••••' : a.p}</div>
                                </div>
                                <button onClick={() => setConfirmTarget(a.u)} className="btn-r">Hapus</button>
                            </div>
                        ))
                    )}
                </div>
                <hr className="divider" />
                <label className="form-label">Tambah Admin Baru</label>
                <form onSubmit={addAdmin}>
                    <div className="form-row">
                        <input value={u} onChange={e => setU(e.target.value)} className="input" placeholder="Username" required />
                        <input value={p} onChange={e => setP(e.target.value)} className="input" placeholder="Password" type="password" required />
                    </div>
                    <button className="btn btn-p">Simpan Admin</button>
                </form>
            </div>
        </>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<SuperAdmin />);
</script>
</body>
</html>
